<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">표준 데이터 모델 인터페이스</title>
  <desc id="desc">기존 사내 시스템, API 서버, Engine 서버, 외부 모델의 서로 다른 데이터 형식을 adapter 계층에서 표준 데이터 모델로 변환하는 구조</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#3182f6"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#6b7684"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="core-gradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <style>
    .page{fill:#f8fafb}
    .panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#soft-shadow)}
    .zone{fill:#f2f7ff;stroke:#d7e8ff;stroke-width:2}
    .external{fill:#fff;stroke:#d6dee6;stroke-width:2}
    .adapter{fill:#fff;stroke:#93c5fd;stroke-width:2.4}
    .core{fill:url(#core-gradient);stroke:#3182f6;stroke-width:3.2}
    .service{fill:#fff;stroke:#cfd9e3;stroke-width:2}
    .model{fill:#f8fafb;stroke:#d6dee6;stroke-width:2}
    .arrow{stroke:#3182f6;stroke-width:4;fill:none;marker-end:url(#arrow-blue);stroke-linecap:round;stroke-linejoin:round}
    .result{stroke:#6b7684;stroke-width:3;fill:none;marker-end:url(#arrow-gray);stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:9 9}
    .thin{stroke:#d6dee6;stroke-width:2;fill:none}
    .title{font:900 38px Pretendard,'Noto Sans KR',Arial,sans-serif;fill:#171f2f}
    .subtitle{font:750 18px Pretendard,'Noto Sans KR',Arial,sans-serif;fill:#4e5968}
    .label{font:900 20px Pretendard,'Noto Sans KR',Arial,sans-serif;fill:#171f2f}
    .small{font:750 14px Pretendard,'Noto Sans KR',Arial,sans-serif;fill:#6b7684}
    .blue{font:900 15px Pretendard,'Noto Sans KR',Arial,sans-serif;fill:#1d4ed8}
    .chip{font:850 13px Pretendard,'Noto Sans KR',Arial,sans-serif;fill:#1d4ed8}
    .tiny{font:750 12px Pretendard,'Noto Sans KR',Arial,sans-serif;fill:#6b7684}
    .white{fill:#fff}
  </style>

  <rect class="page" width="1280" height="760"/>
  <rect class="panel" x="52" y="46" width="1176" height="668" rx="34"/>

  <text class="title" x="92" y="108">표준 데이터 모델을 중심에 둔 인터페이스</text>
  <text class="subtitle" x="92" y="140">시스템마다 다른 입출력 형식은 adapter에 격리하고, 서비스 내부는 하나의 표준 계약으로 처리합니다.</text>

  <rect class="zone" x="80" y="178" width="296" height="438" rx="26"/>
  <text class="blue" x="108" y="214">외부 시스템 형식</text>
  <text class="tiny" x="108" y="238">업무 화면 / 기존 API / 상용 모델 입력</text>

  <rect class="external" x="108" y="270" width="214" height="86" rx="18"/>
  <text class="label" x="142" y="306">기존 사내 시스템</text>
  <text class="small" x="142" y="332">업무 요청 · 결과 수신</text>

  <rect class="external" x="108" y="392" width="214" height="86" rx="18"/>
  <text class="label" x="147" y="428">외부 상용 모델</text>
  <text class="small" x="146" y="454">모델별 입력/출력 포맷</text>

  <rect class="zone" x="416" y="178" width="448" height="438" rx="26"/>
  <text class="blue" x="444" y="214">Backend boundary</text>
  <text class="tiny" x="444" y="238">검증 · 변환 · orchestration · 상태 관리</text>

  <rect class="adapter" x="452" y="278" width="154" height="72" rx="18"/>
  <text class="chip" x="486" y="307">Request</text>
  <text class="chip" x="486" y="328">Adapter</text>

  <rect class="service" x="642" y="258" width="164" height="112" rx="20"/>
  <text class="label" x="676" y="300">API 서버</text>
  <text class="small" x="673" y="327">검증 · job 생성</text>
  <text class="small" x="679" y="348">상태 관리</text>

  <rect class="core" x="504" y="424" width="296" height="122" rx="24"/>
  <text class="label" x="555" y="466">표준 데이터 모델</text>
  <text class="small" x="544" y="495">Vessel · Deck · Hold · Cargo</text>
  <text class="small" x="552" y="518">Port · Height · Constraint · Job</text>

  <rect class="adapter" x="674" y="558" width="154" height="72" rx="18"/>
  <text class="chip" x="717" y="587">Result</text>
  <text class="chip" x="710" y="608">Adapter</text>

  <rect class="adapter" x="900" y="424" width="156" height="72" rx="18"/>
  <text class="chip" x="936" y="453">Model</text>
  <text class="chip" x="930" y="474">Adapter</text>

  <rect class="service" x="900" y="258" width="164" height="112" rx="20"/>
  <text class="label" x="938" y="300">Engine</text>
  <text class="small" x="928" y="327">전처리 · 후처리</text>
  <text class="small" x="940" y="348">모델 호출</text>

  <rect class="zone" x="1096" y="178" width="104" height="438" rx="26"/>
  <text class="blue" x="1118" y="214">모델</text>
  <text class="tiny" x="1118" y="238">입출력</text>
  <rect class="model" x="1112" y="300" width="72" height="76" rx="16"/>
  <text class="small" x="1129" y="332">상용</text>
  <text class="small" x="1129" y="352">모델</text>
  <rect class="model" x="1112" y="420" width="72" height="76" rx="16"/>
  <text class="small" x="1129" y="452">강화</text>
  <text class="small" x="1129" y="472">학습</text>

  <path class="arrow" d="M322 313H452"/>
  <text class="tiny" x="350" y="296">요청 원본</text>

  <path class="arrow" d="M606 314H642"/>
  <path class="arrow" d="M724 370V424"/>
  <text class="tiny" x="742" y="400">정규화</text>

  <path class="arrow" d="M800 470H900"/>
  <text class="tiny" x="828" y="450">표준 계약</text>

  <path class="arrow" d="M978 424V370"/>
  <path class="arrow" d="M1064 314H1112"/>
  <path class="arrow" d="M1056 466H1112"/>

  <path class="result" d="M1112 494C1056 576 930 594 828 594"/>
  <path class="result" d="M674 594C512 594 336 548 218 478"/>
  <text class="tiny" x="920" y="620">모델 결과</text>
  <text class="tiny" x="414" y="620">기존 시스템 응답 변환</text>

  <rect class="white" x="92" y="660" width="1088" height="38" rx="14"/>
  <path class="thin" d="M112 679H248"/>
  <text class="tiny" x="260" y="683">흐름: 외부 요청 → adapter → 표준 모델 → Engine/model adapter → 모델 실행 → 결과 adapter → 기존 시스템 응답</text>
</svg>
