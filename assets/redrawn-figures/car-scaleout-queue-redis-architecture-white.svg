<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Queue와 Redis 기반 scale-out 구조</title>
  <desc id="desc">여러 API pod와 engine worker가 공용 queue와 Redis 상태 저장소를 기준으로 동작하는 scale-out safe 구조</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#3182f6"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.10"/></filter></defs>
  <style>.bg{fill:#f2f4f6}.panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#shadow)}.cluster{fill:#fff;stroke:#d6dee6;stroke-width:2}.pod{fill:#f8fafb;stroke:#d6dee6;stroke-width:2}.core{fill:#eef6ff;stroke:#3182f6;stroke-width:3}.redis{fill:#fff;stroke:#1d4ed8;stroke-width:3}.arrow{stroke:#3182f6;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7684;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}.title{font:900 38px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.h{font:900 21px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.s{font:750 15px Pretendard,'Noto Sans KR',sans-serif;fill:#6b7684}.tag{font:850 15px Pretendard,'Noto Sans KR',sans-serif;fill:#1d4ed8}.cap{font:750 18px Pretendard,'Noto Sans KR',sans-serif;fill:#333d4b}</style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="54" y="54" width="1092" height="612" rx="28"/>
  <text class="title" x="96" y="116">Queue + Redis 기준의 Scale-out Safe 구조</text>
  <text class="cap" x="96" y="154">callback이 어느 pod로 들어와도 공용 상태와 queue를 기준으로 동일한 job을 추적합니다.</text>

  <rect class="cluster" x="82" y="216" width="332" height="358" rx="28"/><text class="tag" x="110" y="250">API Deployment</text>
  <rect class="pod" x="118" y="280" width="118" height="74" rx="16"/><text class="h" x="145" y="324">API-1</text>
  <rect class="pod" x="258" y="280" width="118" height="74" rx="16"/><text class="h" x="285" y="324">API-2</text>
  <rect class="pod" x="188" y="388" width="118" height="74" rx="16"/><text class="h" x="215" y="432">API-3</text>
  <text class="s" x="126" y="522">pod-local memory 사용 금지</text><text class="s" x="126" y="548">job id만 생성하고 상태는 외부화</text>

  <rect class="core" x="500" y="244" width="194" height="104" rx="22"/><text class="h" x="558" y="290">Queue</text><text class="s" x="540" y="320">producer / consumer</text>
  <rect class="redis" x="500" y="424" width="194" height="104" rx="22"/><text class="h" x="559" y="470">Redis</text><text class="s" x="536" y="500">job state · lock · result</text>

  <rect class="cluster" x="780" y="216" width="332" height="358" rx="28"/><text class="tag" x="808" y="250">Engine Deployment</text>
  <rect class="pod" x="816" y="280" width="122" height="74" rx="16"/><text class="h" x="839" y="324">Worker-1</text>
  <rect class="pod" x="956" y="280" width="122" height="74" rx="16"/><text class="h" x="979" y="324">Worker-2</text>
  <rect class="pod" x="886" y="388" width="122" height="74" rx="16"/><text class="h" x="909" y="432">Worker-3</text>
  <text class="s" x="824" y="522">consumer는 Redis lock으로 멱등 처리</text><text class="s" x="824" y="548">완료 결과는 callback과 상태 조회에 사용</text>

  <path class="arrow" d="M414 302 H500"/><text class="tag" x="422" y="284">enqueue</text>
  <path class="arrow" d="M694 302 H780"/><text class="tag" x="704" y="284">consume</text>
  <path class="arrow" d="M414 476 H500"/><text class="tag" x="420" y="458">set/get</text>
  <path class="arrow" d="M780 476 H694"/><text class="tag" x="705" y="458">update</text>
  <path class="dash" d="M1008 354 C1055 622 180 642 176 354"/><text class="tag" x="426" y="634">callback can land on any API pod → Redis 기준으로 결과 회수</text>
</svg>
