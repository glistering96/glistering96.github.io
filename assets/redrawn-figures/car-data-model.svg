<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Hold, Deck, Vessel, Cargo 데이터 모델</title>
  <desc id="desc">선박, 홀드, 데크, 화물, 적부 job을 책임별 객체로 분리한 도메인 데이터 모델 그림</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#3182f6"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.10"/></filter></defs>
  <style>.bg{fill:#f2f4f6}.panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#shadow)}.entity{fill:#fff;stroke:#d6dee6;stroke-width:2}.core{fill:#eef6ff;stroke:#3182f6;stroke-width:3}.rel{stroke:#3182f6;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7684;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}.title{font:900 38px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.h{font:900 21px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.s{font:750 14px Pretendard,'Noto Sans KR',sans-serif;fill:#6b7684}.tag{font:850 15px Pretendard,'Noto Sans KR',sans-serif;fill:#1d4ed8}.cap{font:750 18px Pretendard,'Noto Sans KR',sans-serif;fill:#333d4b}</style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="54" y="54" width="1092" height="612" rx="28"/>
  <text class="title" x="96" y="116">도메인 객체 중심의 표준 Data Model</text>
  <text class="cap" x="96" y="154">외부 입력 차이를 흡수하기 위해 선박 구조, 화물, 실행 job의 책임을 분리했습니다.</text>

  <rect class="core" x="498" y="226" width="204" height="102" rx="22"/><text class="h" x="566" y="270">Vessel</text><text class="s" x="538" y="300">vessel_id, type, voyage</text>
  <rect class="entity" x="226" y="372" width="192" height="102" rx="22"/><text class="h" x="278" y="416">Hold</text><text class="s" x="260" y="446">hold_id, capacity</text>
  <rect class="entity" x="504" y="372" width="192" height="102" rx="22"/><text class="h" x="558" y="416">Deck</text><text class="s" x="536" y="446">floor, clearance, graph</text>
  <rect class="entity" x="782" y="372" width="192" height="102" rx="22"/><text class="h" x="832" y="416">Cargo</text><text class="s" x="810" y="446">height, POD, POL</text>
  <rect class="core" x="498" y="540" width="204" height="74" rx="22"/><text class="h" x="552" y="585">Stowage Job</text>
  <rect class="entity" x="92" y="226" width="230" height="102" rx="22"/><text class="h" x="146" y="270">External Input</text><text class="s" x="130" y="300">legacy schema / files</text>
  <rect class="entity" x="878" y="226" width="230" height="102" rx="22"/><text class="h" x="932" y="270">Model Input</text><text class="s" x="922" y="300">tensor / graph / params</text>

  <path class="rel" d="M322 277 H498"/><text class="tag" x="350" y="258">adapter</text>
  <path class="rel" d="M702 277 H878"/><text class="tag" x="744" y="258">adapter</text>
  <path class="rel" d="M560 328 L392 372"/><path class="rel" d="M600 328 V372"/><path class="rel" d="M642 328 L812 372"/>
  <path class="rel" d="M418 430 C470 506 522 540 560 540"/><path class="rel" d="M600 474 V540"/><path class="rel" d="M782 430 C734 506 680 540 642 540"/>
  <path class="dash" d="M322 300 C412 636 802 636 878 300"/>
  <text class="s" x="314" y="646">계산/변환 로직은 표준 도메인 객체를 기준으로 작동하고, 시스템별 차이는 adapter에서 처리합니다.</text>
</svg>
