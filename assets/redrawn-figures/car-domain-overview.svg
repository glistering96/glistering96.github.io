<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">자동차선 내부 도메인 이해</title>
  <desc id="desc">자동차선 내부 적재 구획, 차량 높이, 통행로, 선적/양하 순서 제약을 정리한 개요 다이어그램</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#3182f6"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.10"/></filter></defs>
  <style>.bg{fill:#f2f4f6}.panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#shadow)}.ship{fill:#eef6ff;stroke:#1d4ed8;stroke-width:3}.deck{fill:#fff;stroke:#d6dee6;stroke-width:2}.lane{fill:none;stroke:#3182f6;stroke-width:4;stroke-dasharray:10 8;marker-end:url(#arrow)}.car{fill:#3182f6}.car2{fill:#1d4ed8}.rule{fill:#f8fafb;stroke:#d6dee6;stroke-width:2}.title{font:900 38px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.h{font:900 20px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.s{font:750 15px Pretendard,'Noto Sans KR',sans-serif;fill:#6b7684}.tag{font:850 15px Pretendard,'Noto Sans KR',sans-serif;fill:#1d4ed8}.cap{font:750 18px Pretendard,'Noto Sans KR',sans-serif;fill:#333d4b}</style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="54" y="54" width="1092" height="612" rx="28"/>
  <text class="title" x="96" y="116">자동차선 적부 도메인: 공간·차량·순서 제약</text>
  <text class="cap" x="96" y="154">단순 주차가 아니라 통행로, 높이, 선적/양하 순서를 동시에 만족해야 하는 최적화 문제입니다.</text>

  <path class="ship" d="M112 254 L236 198 H704 L800 254 V536 H170 L112 474 Z"/>
  <rect class="deck" x="188" y="248" width="154" height="92" rx="12"/><rect class="deck" x="362" y="248" width="154" height="92" rx="12"/><rect class="deck" x="536" y="248" width="154" height="92" rx="12"/>
  <rect class="deck" x="188" y="372" width="154" height="92" rx="12"/><rect class="deck" x="362" y="372" width="154" height="92" rx="12"/><rect class="deck" x="536" y="372" width="154" height="92" rx="12"/>
  <path class="lane" d="M168 360 C288 352 442 352 676 360"/>
  <rect class="car" x="216" y="276" width="62" height="30" rx="8"/><rect class="car2" x="402" y="276" width="72" height="34" rx="8"/><rect class="car" x="570" y="404" width="62" height="30" rx="8"/><rect class="car2" x="242" y="404" width="76" height="38" rx="8"/>
  <text class="s" x="218" y="518">층별 적재 구획과 통행 가능 구간</text>

  <rect class="rule" x="862" y="226" width="230" height="86" rx="18"/><text class="h" x="904" y="264">높이 제약</text><text class="s" x="896" y="290">deck별 clearance 확인</text>
  <rect class="rule" x="862" y="342" width="230" height="86" rx="18"/><text class="h" x="904" y="380">통행 제약</text><text class="s" x="898" y="406">차량이 빠져나갈 길 보존</text>
  <rect class="rule" x="862" y="458" width="230" height="86" rx="18"/><text class="h" x="904" y="496">순서 제약</text><text class="s" x="900" y="522">양하지 순서와 재배치 최소화</text>
  <path class="lane" d="M800 296 H862"/><path class="lane" d="M800 386 H862"/><path class="lane" d="M800 476 H862"/>
  <text class="tag" x="166" y="226">Deck / Hold abstraction</text><text class="tag" x="900" y="602">Domain rules → API input contract</text>
</svg>
