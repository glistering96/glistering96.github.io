<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">비동기 callback 구조: 요청-응답 분리</title>
  <desc id="desc">요청 접수와 모델 결과 수신을 분리한 queue 및 callback 구조를 단계별로 나타낸 SVG</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#3182f6"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.10"/></filter></defs>
  <style>.bg{fill:#f2f4f6}.panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#shadow)}.swim{fill:#f8fafb;stroke:#d6dee6;stroke-width:2}.box{fill:#fff;stroke:#d6dee6;stroke-width:2}.core{fill:#eef6ff;stroke:#3182f6;stroke-width:3}.arrow{stroke:#3182f6;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7684;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}.title{font:900 38px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.h{font:900 20px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.s{font:750 14px Pretendard,'Noto Sans KR',sans-serif;fill:#6b7684}.tag{font:850 15px Pretendard,'Noto Sans KR',sans-serif;fill:#1d4ed8}.cap{font:750 18px Pretendard,'Noto Sans KR',sans-serif;fill:#333d4b}</style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="54" y="54" width="1092" height="612" rx="28"/>
  <text class="title" x="96" y="116">요청 API와 Callback API의 책임 분리</text>
  <text class="cap" x="96" y="154">수분 단위 추론은 queue로 넘기고, 완료 신호는 별도 callback endpoint에서 상태를 갱신합니다.</text>

  <rect class="swim" x="94" y="218" width="1010" height="126" rx="24"/><text class="tag" x="120" y="252">Request path</text>
  <rect class="swim" x="94" y="398" width="1010" height="126" rx="24"/><text class="tag" x="120" y="432">Callback path</text>
  <rect class="box" x="150" y="270" width="120" height="58" rx="15"/><text class="h" x="180" y="307">Client</text>
  <rect class="core" x="340" y="270" width="142" height="58" rx="15"/><text class="h" x="368" y="307">Request API</text>
  <rect class="box" x="552" y="270" width="130" height="58" rx="15"/><text class="h" x="588" y="307">Queue</text>
  <rect class="core" x="752" y="270" width="144" height="58" rx="15"/><text class="h" x="786" y="307">Worker</text>
  <rect class="box" x="966" y="270" width="94" height="58" rx="15"/><text class="h" x="988" y="307">Model</text>
  <rect class="box" x="966" y="450" width="94" height="58" rx="15"/><text class="h" x="984" y="487">Done</text>
  <rect class="core" x="752" y="450" width="144" height="58" rx="15"/><text class="h" x="788" y="487">Callback</text>
  <rect class="box" x="552" y="450" width="130" height="58" rx="15"/><text class="h" x="580" y="487">Redis</text>
  <rect class="box" x="340" y="450" width="142" height="58" rx="15"/><text class="h" x="366" y="487">Result API</text>
  <rect class="box" x="150" y="450" width="120" height="58" rx="15"/><text class="h" x="180" y="487">Client</text>

  <path class="arrow" d="M270 299 H340"/><path class="arrow" d="M482 299 H552"/><path class="arrow" d="M682 299 H752"/><path class="arrow" d="M896 299 H966"/>
  <path class="dash" d="M1012 328 V450"/><path class="arrow" d="M966 479 H896"/><path class="arrow" d="M752 479 H682"/><path class="arrow" d="M552 479 H482"/><path class="arrow" d="M340 479 H270"/>
  <text class="s" x="344" y="372">Request API는 job_id를 즉시 반환하고 연결 유지 비용을 제거</text>
  <text class="s" x="344" y="558">Callback API는 결과 정규화와 상태 변경만 처리</text>
  <text class="tag" x="96" y="626">운영 포인트: timeout 회피 · 재처리 가능성 · job state 추적</text>
</svg>
