<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes 기반 AI 서비스 운영 플랫폼</title>
  <desc id="desc">Gateway, service layer, model serving, storage, observability, CI/CD를 포함한 내부 Kubernetes 기반 AI 서비스 플랫폼 개요</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#3182f6"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.10"/></filter></defs>
  <style>.bg{fill:#f2f4f6}.panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#shadow)}.cluster{fill:#f8fafb;stroke:#d6dee6;stroke-width:2}.box{fill:#fff;stroke:#d6dee6;stroke-width:2}.core{fill:#eef6ff;stroke:#3182f6;stroke-width:3}.ops{fill:#fff;stroke:#3182f6;stroke-width:2;stroke-dasharray:7 6}.arrow{stroke:#3182f6;stroke-width:4;fill:none;marker-end:url(#arrow)}.dash{stroke:#6b7684;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}.title{font:900 38px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.h{font:900 20px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.s{font:750 14px Pretendard,'Noto Sans KR',sans-serif;fill:#6b7684}.tag{font:850 15px Pretendard,'Noto Sans KR',sans-serif;fill:#1d4ed8}.cap{font:750 18px Pretendard,'Noto Sans KR',sans-serif;fill:#333d4b}</style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="54" y="54" width="1092" height="612" rx="28"/>
  <text class="title" x="96" y="116">AI 서비스 운영을 위한 Kubernetes 기반</text>
  <text class="cap" x="96" y="154">폐쇄망 환경에서도 배포, 라우팅, 확장, 관측을 같은 클러스터 운영 단위로 관리합니다.</text>

  <rect class="box" x="92" y="286" width="150" height="96" rx="20"/><text class="h" x="128" y="328">Users</text><text class="s" x="115" y="356">internal clients</text>
  <rect class="core" x="304" y="262" width="174" height="120" rx="22"/><text class="h" x="348" y="308">Istio</text><text class="h" x="332" y="336">Gateway API</text><text class="s" x="335" y="362">routing · policy</text>
  <rect class="cluster" x="548" y="214" width="540" height="352" rx="28"/><text class="tag" x="580" y="248">Kubernetes Cluster</text>
  <rect class="box" x="590" y="288" width="138" height="88" rx="18"/><text class="h" x="624" y="328">AI API</text><text class="s" x="612" y="354">FastAPI pods</text>
  <rect class="box" x="760" y="288" width="138" height="88" rx="18"/><text class="h" x="785" y="328">Model</text><text class="s" x="786" y="354">serving pods</text>
  <rect class="box" x="930" y="288" width="116" height="88" rx="18"/><text class="h" x="962" y="328">Jobs</text><text class="s" x="952" y="354">workers</text>
  <rect class="ops" x="590" y="430" width="138" height="76" rx="18"/><text class="h" x="614" y="470">Harbor</text><text class="s" x="612" y="492">images</text>
  <rect class="ops" x="760" y="430" width="138" height="76" rx="18"/><text class="h" x="788" y="470">Longhorn</text><text class="s" x="795" y="492">storage</text>
  <rect class="ops" x="930" y="430" width="116" height="76" rx="18"/><text class="h" x="950" y="470">Redis</text><text class="s" x="949" y="492">state</text>
  <rect class="box" x="304" y="442" width="174" height="96" rx="20"/><text class="h" x="340" y="484">GitLab</text><text class="s" x="333" y="512">CI/CD · Helm</text>
  <rect class="box" x="92" y="442" width="150" height="96" rx="20"/><text class="h" x="122" y="484">Grafana</text><text class="s" x="110" y="512">Prometheus · Loki</text>

  <path class="arrow" d="M242 334 H304"/><path class="arrow" d="M478 322 H548"/><path class="arrow" d="M728 332 H760"/><path class="arrow" d="M898 332 H930"/>
  <path class="arrow" d="M478 490 C514 490 524 468 590 468"/><path class="dash" d="M590 468 C472 604 236 560 180 538"/>
  <path class="dash" d="M930 468 C702 620 232 606 168 538"/>
  <text class="s" x="584" y="626">서비스별 독립 배포와 공통 운영 스택을 분리해 장애 범위와 운영 책임을 명확히 합니다.</text>
</svg>
