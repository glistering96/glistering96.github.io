  <rect class="pill" x="148" y="574" width="220" height="44" rx="22"/><text class="pilltext" x="181" y="602">Node = 적재 가능 공간</text>
  <rect class="pill" x="396" y="574" width="250" height="44" rx="22"/><text class="pilltext" x="427" y="602">Edge = 차량 통행 가능성</text>
