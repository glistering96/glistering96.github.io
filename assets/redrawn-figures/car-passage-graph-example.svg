<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">선박 공간 graph 추상화</title>
  <desc id="desc">선박 적재 구역을 node로, 차량 통행 가능성을 edge로 다시 그린 SVG 다이어그램</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#3182f6"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.12"/></filter>
  </defs>
  <style>
    .bg{fill:#f2f4f6}.panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#shadow)}.deck{fill:#eef6ff;stroke:#1d4ed8;stroke-width:3}.zone{fill:#fff;stroke:#d6dee6;stroke-width:2}.path{stroke:#3182f6;stroke-width:4;fill:none;marker-end:url(#arrow)}.node{fill:#3182f6;stroke:#fff;stroke-width:5}.node2{fill:#1d4ed8;stroke:#fff;stroke-width:5}.label{font:800 22px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.small{font:700 16px Pretendard,'Noto Sans KR',sans-serif;fill:#6b7684}.title{font:900 38px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.caption{font:750 18px Pretendard,'Noto Sans KR',sans-serif;fill:#333d4b}.pill{fill:#eef6ff;stroke:#d8e8ff;stroke-width:2}.pilltext{font:800 15px Pretendard,'Noto Sans KR',sans-serif;fill:#1d4ed8}
  </style>
  <rect class="bg" width="1200" height="720" rx="0"/>
  <rect class="panel" x="56" y="54" width="1088" height="612" rx="28"/>
  <text class="title" x="96" y="116">선박 공간을 Graph로 추상화</text>
  <text class="caption" x="96" y="154">적재 가능 구역은 node, 차량 통행 가능성은 edge로 모델링해 선박별 구조 차이를 데이터로 다룹니다.</text>

