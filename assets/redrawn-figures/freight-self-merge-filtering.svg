<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Self-merge 기반 복화 후보 생성</title>
  <desc id="desc">운송 테이블을 자기 자신과 merge하고 boolean filtering으로 후보 pair를 만든 뒤 score를 계산하는 흐름</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#3182f6"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#313e50" flood-opacity="0.10"/></filter></defs>
  <style>.bg{fill:#f2f4f6}.panel{fill:#fff;stroke:#e5e8eb;stroke-width:2;filter:url(#shadow)}.table{fill:#fff;stroke:#d6dee6;stroke-width:2}.head{fill:#eef6ff}.filter{fill:#f8fafb;stroke:#3182f6;stroke-width:2}.out{fill:#eef6ff;stroke:#1d4ed8;stroke-width:3}.arrow{stroke:#3182f6;stroke-width:4;fill:none;marker-end:url(#arrow)}.title{font:900 38px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.h{font:900 20px Pretendard,'Noto Sans KR',sans-serif;fill:#171f2f}.s{font:750 14px Pretendard,'Noto Sans KR',sans-serif;fill:#6b7684}.tag{font:850 15px Pretendard,'Noto Sans KR',sans-serif;fill:#1d4ed8}.cap{font:750 18px Pretendard,'Noto Sans KR',sans-serif;fill:#333d4b}</style>
  <rect class="bg" width="1200" height="720"/>
  <rect class="panel" x="54" y="54" width="1092" height="612" rx="28"/>
  <text class="title" x="96" y="116">복화 후보 탐색을 DataFrame 연산으로 전환</text>
  <text class="cap" x="96" y="154">brute-force loop 대신 self-merge와 boolean indexing으로 후보 pair를 벡터화합니다.</text>

  <rect class="table" x="88" y="236" width="220" height="210" rx="18"/><rect class="head" x="88" y="236" width="220" height="44" rx="18"/><text class="h" x="128" y="265">Loads A</text>
  <text class="s" x="116" y="314">id  origin  dest</text><text class="s" x="116" y="346">L01  A      B</text><text class="s" x="116" y="378">L02  C      D</text><text class="s" x="116" y="410">L03  B      C</text>
  <rect class="table" x="88" y="474" width="220" height="114" rx="18"/><rect class="head" x="88" y="474" width="220" height="42" rx="18"/><text class="h" x="124" y="503">Loads B</text><text class="s" x="116" y="550">same table copy</text>

  <rect class="filter" x="398" y="284" width="188" height="124" rx="22"/><text class="h" x="448" y="326">self_merge</text><text class="s" x="431" y="356">candidate cartesian</text><text class="s" x="454" y="382">join columns</text>
  <rect class="filter" x="668" y="232" width="218" height="98" rx="20"/><text class="h" x="724" y="274">Filter 01</text><text class="s" x="706" y="302">시간 창 / 거리 조건</text>
  <rect class="filter" x="668" y="354" width="218" height="98" rx="20"/><text class="h" x="724" y="396">Filter 02</text><text class="s" x="704" y="424">방향성 / 중복 제거</text>
  <rect class="filter" x="668" y="476" width="218" height="98" rx="20"/><text class="h" x="724" y="518">Filter 03</text><text class="s" x="707" y="546">차량·상차 제약</text>
  <rect class="out" x="972" y="306" width="146" height="176" rx="24"/><text class="h" x="1004" y="350">Candidate</text><text class="h" x="1016" y="378">Pairs</text><text class="s" x="1002" y="414">L01 → L03</text><text class="s" x="1002" y="442">L02 → L04</text><text class="s" x="1002" y="470">score ready</text>

  <path class="arrow" d="M308 340 H398"/><path class="arrow" d="M308 530 C354 530 362 408 398 372"/><text class="tag" x="334" y="318">left/right copy</text>
  <path class="arrow" d="M586 346 H668"/><text class="tag" x="602" y="326">boolean mask</text>
  <path class="arrow" d="M886 282 C924 298 948 322 972 350"/>
  <path class="arrow" d="M886 404 H972"/>
  <path class="arrow" d="M886 526 C926 508 950 474 972 440"/>
  <text class="s" x="420" y="626">핵심: 조합 탐색을 Python loop가 아니라 join/filter 연산으로 재정의해 응답 시간을 줄입니다.</text>
</svg>
